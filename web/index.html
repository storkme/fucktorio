<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fucktorio</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1e1e1e;
        color: #e0e0e0;
      }
      #app {
        display: flex;
        height: 100vh;
        width: 100vw;
      }
      #sidebar {
        width: 300px;
        flex-shrink: 0;
        background: #252526;
        border-right: 1px solid #333;
        padding: 16px;
        overflow-y: auto;
        box-sizing: border-box;
      }
      #canvas-container {
        flex: 1;
        position: relative;
        overflow: hidden;
      }
      #canvas-container canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="sidebar" style="display:none">Solver output will appear here</div>
      <div id="canvas-container" style="display:none"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
