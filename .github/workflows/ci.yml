name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install factorio-draftsman pytest
      - run: pytest tests/ -v --viz --junitxml=test-results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-visualizations
          path: test_viz/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  deploy-viz:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: test-visualizations
          path: site/
      - name: Generate index.html
        run: |
          cd site
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Test Visualizations</title><style>body{font-family:sans-serif;max-width:800px;margin:2rem auto;padding:0 1rem}a{display:block;padding:.3rem 0}</style></head><body><h1>Test Visualizations</h1><ul>' > index.html
          for f in *.html; do
            [ "$f" = "index.html" ] && continue
            echo "<li><a href=\"$f\">$f</a></li>" >> index.html
          done
          echo '</ul></body></html>' >> index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/
      - id: deployment
        uses: actions/deploy-pages@v4
