name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
      - run: pip install factorio-draftsman pytest pytest-timeout maturin
      - run: maturin build --release
      - run: pip install target/wheels/*.whl --no-deps
      - run: pytest tests/ -v --viz --timeout=120 --junitxml=test-results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-visualizations
          path: test_viz/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run -p fucktorio_core --profile ci
      - run: cargo clippy -p fucktorio_core -- -D warnings
      - name: Generate test summary
        if: always()
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET, os
          path = "target/nextest/ci/junit.xml"
          if not os.path.exists(path):
              print("No JUnit XML found"); exit(0)
          tree = ET.parse(path)
          root = tree.getroot()
          total = int(root.get("tests", 0))
          failures = int(root.get("failures", 0))
          errors = int(root.get("errors", 0))
          time = root.get("time", "?")

          f = open(os.environ["GITHUB_STEP_SUMMARY"], "a")
          f.write("### Rust Test Results\n\n")
          f.write(f"**{total}** tests | **{total - failures - errors}** passed | **{failures}** failed | **{time}s**\n\n")
          f.write("| Test | Status | Duration |\n|------|--------|----------|\n")
          for ts in root.iter("testsuite"):
              for tc in ts.iter("testcase"):
                  name = tc.get("name", "?")
                  t = tc.get("time", "0")
                  fail = tc.find("failure")
                  if fail is not None:
                      f.write(f"| {name} | :x: FAIL | {t}s |\n")
                  else:
                      skip = tc.find("skipped")
                      if skip is not None:
                          f.write(f"| {name} | :zzz: SKIP | {t}s |\n")
                      else:
                          f.write(f"| {name} | :white_check_mark: | {t}s |\n")
          f.close()
          PYEOF
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rust-test-results
          path: target/nextest/ci/junit.xml

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        run: wasm-pack build crates/wasm-bindings --target web --out-dir $GITHUB_WORKSPACE/web/src/wasm-pkg
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [test, web]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: site/
      - uses: actions/download-artifact@v4
        with:
          name: test-visualizations
          path: site/viz/
      - name: Generate viz index
        run: |
          python3 - <<'PYEOF'
          import os, html

          viz_dir = 'site/viz'
          files = sorted(f for f in os.listdir(viz_dir) if f.endswith('.html') and f != 'index.html')

          bus = [f for f in files if f.startswith('bus-')]
          spaghetti = [f for f in files if f != 'showcase.html' and not f.startswith('bus-')]
          tools = [f for f in files if f == 'showcase.html']

          def write_section(out, title, items):
              if not items:
                  return
              out.write(f'<h2>{title}</h2><ul>')
              for f in items:
                  label = f.replace('.html', '').replace('-', ' ').replace('_', ' ')
                  out.write(f'<li><a href="{html.escape(f)}">{html.escape(label)}</a></li>')
              out.write('</ul>')

          with open(os.path.join(viz_dir, 'index.html'), 'w') as out:
              out.write('<!DOCTYPE html><html><head><meta charset="utf-8">')
              out.write('<title>Fucktorio - Test Visualizations</title>')
              out.write('<style>')
              out.write('body{font-family:sans-serif;max-width:900px;margin:2rem auto;padding:0 1rem;background:#1a1a2e;color:#e0e0e0}')
              out.write('h1{color:#ff6b9d}')
              out.write('h2{color:#c792ea;margin-top:2rem;border-bottom:1px solid #333;padding-bottom:.3rem}')
              out.write('a{color:#82aaff;text-decoration:none;display:block;padding:.25rem 0}')
              out.write('a:hover{color:#ff6b9d;text-decoration:underline}')
              out.write('</style></head><body>')
              out.write('<h1>Fucktorio Test Visualizations</h1>')
              out.write('<p><a href="/">&larr; Back to app</a></p>')
              write_section(out, 'Bus Designs', bus)
              write_section(out, 'Spaghetti Layouts', spaghetti)
              write_section(out, 'Tools', tools)
              out.write('</body></html>')
          PYEOF
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site/
      - id: deployment
        uses: actions/deploy-pages@v5
