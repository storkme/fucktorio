name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
      - run: pip install factorio-draftsman pytest pytest-timeout maturin
      - run: maturin build --release
      - run: pip install target/wheels/*.whl --no-deps
      - run: pytest tests/ -v --viz --timeout=120 --junitxml=test-results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-visualizations
          path: test_viz/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  deploy-viz:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: test-visualizations
          path: site/
      - name: Generate index.html
        run: |
          cd site
          python3 - <<'PYEOF'
          import os, html

          files = sorted(f for f in os.listdir('.') if f.endswith('.html') and f != 'index.html')

          layouts = [f for f in files if f != 'showcase.html']
          tools = [f for f in files if f == 'showcase.html']

          with open('index.html', 'w') as out:
              out.write('<!DOCTYPE html><html><head><meta charset="utf-8">')
              out.write('<title>Fucktorio - Test Visualizations</title>')
              out.write('<style>')
              out.write('body{font-family:sans-serif;max-width:900px;margin:2rem auto;padding:0 1rem;background:#1a1a2e;color:#e0e0e0}')
              out.write('h1{color:#ff6b9d}')
              out.write('h2{color:#c792ea;margin-top:2rem;border-bottom:1px solid #333;padding-bottom:.3rem}')
              out.write('a{color:#82aaff;text-decoration:none;display:block;padding:.25rem 0}')
              out.write('a:hover{color:#ff6b9d;text-decoration:underline}')
              out.write('</style></head><body>')
              out.write('<h1>Fucktorio Test Visualizations</h1>')

              if layouts:
                  out.write('<h2>Layouts</h2><ul>')
                  for f in layouts:
                      label = f.replace('.html', '').replace('-', ' ').replace('_', ' ')
                      out.write(f'<li><a href="{html.escape(f)}">{html.escape(label)}</a></li>')
                  out.write('</ul>')

              if tools:
                  out.write('<h2>Tools</h2><ul>')
                  for f in tools:
                      label = f.replace('.html', '').replace('-', ' ').replace('_', ' ')
                      out.write(f'<li><a href="{html.escape(f)}">{html.escape(label)}</a></li>')
                  out.write('</ul>')

              out.write('</body></html>')
          PYEOF
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site/
      - id: deployment
        uses: actions/deploy-pages@v5
