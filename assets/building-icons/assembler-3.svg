<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="a3Frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a4a38"/>
      <stop offset="100%" stop-color="#222e20"/>
    </linearGradient>
    <linearGradient id="a3Face" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2e4030"/>
      <stop offset="100%" stop-color="#3e5240"/>
    </linearGradient>
    <linearGradient id="a3Window" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060c06"/>
      <stop offset="100%" stop-color="#0a180a"/>
    </linearGradient>
    <linearGradient id="a3Gear1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7a9878"/>
      <stop offset="100%" stop-color="#4a6448"/>
    </linearGradient>
    <linearGradient id="a3Gear2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8aa888"/>
      <stop offset="100%" stop-color="#5a7458"/>
    </linearGradient>
  </defs>

  <!-- Outer frame -->
  <rect x="4" y="14" width="88" height="74" rx="4" fill="url(#a3Frame)" stroke="#121c10" stroke-width="1.5"/>
  <!-- Face panel -->
  <rect x="9" y="20" width="78" height="62" rx="3" fill="url(#a3Face)" stroke="#1c2c1a" stroke-width="1"/>
  <!-- Top header bar -->
  <rect x="4" y="14" width="88" height="12" rx="4" fill="#2e4030" stroke="#121c10" stroke-width="1.5"/>

  <!-- Top vent slots -->
  <rect x="14" y="16" width="12" height="4" rx="1" fill="#121c10"/>
  <rect x="30" y="16" width="12" height="4" rx="1" fill="#121c10"/>
  <rect x="46" y="16" width="12" height="4" rx="1" fill="#121c10"/>
  <rect x="62" y="16" width="12" height="4" rx="1" fill="#121c10"/>

  <!-- Large display window -->
  <rect x="12" y="28" width="72" height="46" rx="3" fill="url(#a3Window)" stroke="#1c2c1a" stroke-width="1.2"/>
  <rect x="12.5" y="28.5" width="71" height="2" rx="1" fill="white" opacity="0.06"/>

  <!-- Gear 1 (left), R=13, r=9.75, hub=4.9, cx=35 cy=51 -->
  <path fill-rule="evenodd"
        transform="translate(35,51)"
        d="M13,0 L9.01,3.73 9.19,9.19 3.73,9.01 0,13 -3.73,9.01 -9.19,9.19 -9.01,3.73 -13,0 -9.01,-3.73 -9.19,-9.19 -3.73,-9.01 0,-13 3.73,-9.01 9.19,-9.19 9.01,-3.73 Z M4.9,0 A4.9,4.9 0 1,0 -4.9,0 A4.9,4.9 0 1,0 4.9,0 Z"
        fill="url(#a3Gear1)" stroke="#1a2c18" stroke-width="0.8" stroke-linejoin="round"/>

  <!-- Gear 2 (right), R=13, cx=61 cy=51, meshing rotation -->
  <path fill-rule="evenodd"
        transform="translate(61,51) rotate(22.5)"
        d="M13,0 L9.01,3.73 9.19,9.19 3.73,9.01 0,13 -3.73,9.01 -9.19,9.19 -9.01,3.73 -13,0 -9.01,-3.73 -9.19,-9.19 -3.73,-9.01 0,-13 3.73,-9.01 9.19,-9.19 9.01,-3.73 Z M4.9,0 A4.9,4.9 0 1,0 -4.9,0 A4.9,4.9 0 1,0 4.9,0 Z"
        fill="url(#a3Gear2)" stroke="#1a2c18" stroke-width="0.8" stroke-linejoin="round"/>

  <!-- Gear center shaft dots -->
  <circle cx="35" cy="51" r="1.8" fill="#121c10" opacity="0.6"/>
  <circle cx="61" cy="51" r="1.8" fill="#121c10" opacity="0.6"/>

  <!-- Corner bolts -->
  <circle cx="11" cy="22" r="2.2" fill="#121c10" stroke="#4a6048" stroke-width="0.7"/>
  <circle cx="85" cy="22" r="2.2" fill="#121c10" stroke="#4a6048" stroke-width="0.7"/>
  <circle cx="11" cy="80" r="2.2" fill="#121c10" stroke="#4a6048" stroke-width="0.7"/>
  <circle cx="85" cy="80" r="2.2" fill="#121c10" stroke="#4a6048" stroke-width="0.7"/>

  <!-- Side panel accents -->
  <rect x="4" y="30" width="5" height="16" rx="2" fill="#1c2c1a" stroke="#2e4030" stroke-width="0.8"/>
  <rect x="87" y="30" width="5" height="16" rx="2" fill="#1c2c1a" stroke="#2e4030" stroke-width="0.8"/>

  <!-- Bottom vent slots -->
  <rect x="18" y="78" width="10" height="4" rx="1" fill="#121c10"/>
  <rect x="34" y="78" width="10" height="4" rx="1" fill="#121c10"/>
  <rect x="50" y="78" width="10" height="4" rx="1" fill="#121c10"/>
  <rect x="66" y="78" width="10" height="4" rx="1" fill="#121c10"/>

  <!-- Base band -->
  <rect x="4" y="78" width="88" height="10" rx="3" fill="#222e20" stroke="#121c10" stroke-width="1.5"/>
</svg>
