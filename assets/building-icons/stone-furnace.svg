<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="sfStone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a8270"/>
      <stop offset="100%" stop-color="#606050"/>
    </linearGradient>
    <linearGradient id="sfStoneTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a09080"/>
      <stop offset="100%" stop-color="#706860"/>
    </linearGradient>
    <!-- Fire glow gradient -->
    <radialGradient id="sfFire" cx="50%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#ffe040"/>
      <stop offset="35%" stop-color="#ff8820"/>
      <stop offset="70%" stop-color="#cc3008"/>
      <stop offset="100%" stop-color="#500800"/>
    </radialGradient>
    <linearGradient id="sfFireOuter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9030"/>
      <stop offset="100%" stop-color="#600800"/>
    </linearGradient>
  </defs>

  <!-- Stone body shadow -->
  <rect x="7" y="24" width="84" height="64" rx="5" fill="#404038" opacity="0.5"/>
  <!-- Main stone body -->
  <rect x="5" y="22" width="84" height="62" rx="5" fill="url(#sfStone)" stroke="#383028" stroke-width="1.5"/>
  <!-- Top block -->
  <rect x="5" y="22" width="84" height="14" rx="5" fill="url(#sfStoneTop)" stroke="#383028" stroke-width="1.5"/>

  <!-- Stone masonry lines (horizontal courses) -->
  <line x1="7" y1="36" x2="87" y2="36" stroke="#484038" stroke-width="1" opacity="0.6"/>
  <line x1="7" y1="50" x2="87" y2="50" stroke="#484038" stroke-width="1" opacity="0.6"/>
  <line x1="7" y1="64" x2="87" y2="64" stroke="#484038" stroke-width="1" opacity="0.6"/>
  <!-- Vertical block joints (staggered per row) -->
  <line x1="26" y1="36" x2="26" y2="50" stroke="#484038" stroke-width="0.8" opacity="0.5"/>
  <line x1="52" y1="36" x2="52" y2="50" stroke="#484038" stroke-width="0.8" opacity="0.5"/>
  <line x1="74" y1="36" x2="74" y2="50" stroke="#484038" stroke-width="0.8" opacity="0.5"/>
  <line x1="16" y1="50" x2="16" y2="64" stroke="#484038" stroke-width="0.8" opacity="0.5"/>
  <line x1="42" y1="50" x2="42" y2="64" stroke="#484038" stroke-width="0.8" opacity="0.5"/>
  <line x1="66" y1="50" x2="66" y2="64" stroke="#484038" stroke-width="0.8" opacity="0.5"/>
  <line x1="30" y1="22" x2="30" y2="36" stroke="#484038" stroke-width="0.8" opacity="0.5"/>
  <line x1="58" y1="22" x2="58" y2="36" stroke="#484038" stroke-width="0.8" opacity="0.5"/>

  <!-- Furnace mouth arch (recessed) -->
  <rect x="14" y="48" width="68" height="30" rx="4" fill="#2a1c0c" stroke="#282010" stroke-width="1.5"/>
  <!-- Arch top rounded -->
  <ellipse cx="48" cy="48" rx="34" ry="10" fill="#2a1c0c" stroke="#282010" stroke-width="1.5"/>

  <!-- Fire inside -->
  <ellipse cx="48" cy="68" rx="28" ry="18" fill="url(#sfFire)"/>
  <!-- Flame shapes -->
  <ellipse cx="36" cy="62" rx="7" ry="14" fill="#ff9030" opacity="0.6"/>
  <ellipse cx="48" cy="58" rx="8" ry="16" fill="#ffe060" opacity="0.5"/>
  <ellipse cx="60" cy="63" rx="7" ry="13" fill="#ff8820" opacity="0.6"/>
  <!-- Fire hotspot -->
  <ellipse cx="48" cy="70" rx="12" ry="8" fill="#fff0a0" opacity="0.4"/>

  <!-- Arch recess border glow -->
  <rect x="14" y="48" width="68" height="30" rx="4" fill="none" stroke="#ff6010" stroke-width="0.8" opacity="0.5"/>

  <!-- Chimney stub on top -->
  <rect x="36" y="10" width="24" height="16" rx="3" fill="#747068" stroke="#383028" stroke-width="1.2"/>
  <rect x="34" y="8" width="28" height="6" rx="2" fill="#888070" stroke="#383028" stroke-width="1.2"/>
  <!-- Chimney smoke hint -->
  <ellipse cx="48" cy="7" rx="10" ry="4" fill="#606058" opacity="0.3"/>

  <!-- Base foot -->
  <rect x="5" y="78" width="84" height="8" rx="3" fill="#505040" stroke="#383028" stroke-width="1.5"/>

  <!-- Corner stones (rough blocks) -->
  <rect x="5" y="22" width="9" height="9" rx="1" fill="#909080" stroke="#484038" stroke-width="0.8"/>
  <rect x="82" y="22" width="9" height="9" rx="1" fill="#909080" stroke="#484038" stroke-width="0.8"/>
  <rect x="5" y="69" width="9" height="9" rx="1" fill="#909080" stroke="#484038" stroke-width="0.8"/>
  <rect x="82" y="69" width="9" height="9" rx="1" fill="#909080" stroke="#484038" stroke-width="0.8"/>
</svg>
