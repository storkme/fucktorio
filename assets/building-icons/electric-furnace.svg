<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="efBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#505868"/>
      <stop offset="100%" stop-color="#6a7280"/>
    </linearGradient>
    <linearGradient id="efTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a8490"/>
      <stop offset="100%" stop-color="#545c68"/>
    </linearGradient>
    <linearGradient id="efPanel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2430"/>
      <stop offset="100%" stop-color="#141820"/>
    </linearGradient>
    <!-- Electric coil glow -->
    <linearGradient id="efCoil" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8040d0"/>
      <stop offset="50%" stop-color="#4020a0"/>
      <stop offset="100%" stop-color="#200880"/>
    </linearGradient>
    <radialGradient id="efEnergyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a060ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4010c0" stop-opacity="0.05"/>
    </radialGradient>
  </defs>

  <!-- Outer body shadow -->
  <rect x="6" y="16" width="86" height="74" rx="4" fill="#202830" opacity="0.5"/>
  <!-- Main body -->
  <rect x="4" y="14" width="88" height="74" rx="4" fill="url(#efBody)" stroke="#282c38" stroke-width="1.5"/>
  <!-- Top cap -->
  <rect x="4" y="14" width="88" height="14" rx="4" fill="url(#efTop)" stroke="#282c38" stroke-width="1.5"/>

  <!-- Top vent grill -->
  <rect x="14" y="16" width="8" height="5" rx="1" fill="#282c38"/>
  <rect x="26" y="16" width="8" height="5" rx="1" fill="#282c38"/>
  <rect x="38" y="16" width="8" height="5" rx="1" fill="#282c38"/>
  <rect x="50" y="16" width="8" height="5" rx="1" fill="#282c38"/>
  <rect x="62" y="16" width="8" height="5" rx="1" fill="#282c38"/>
  <rect x="74" y="16" width="8" height="5" rx="1" fill="#282c38"/>

  <!-- === LEFT ENERGY PANEL === -->
  <rect x="6" y="30" width="18" height="50" rx="2" fill="url(#efPanel)" stroke="#282c38" stroke-width="1"/>
  <!-- Energy coil bars (left panel) -->
  <rect x="8" y="33" width="14" height="5" rx="1" fill="url(#efCoil)" opacity="0.9"/>
  <rect x="8" y="41" width="14" height="5" rx="1" fill="url(#efCoil)" opacity="0.8"/>
  <rect x="8" y="49" width="14" height="5" rx="1" fill="url(#efCoil)" opacity="0.7"/>
  <rect x="8" y="57" width="14" height="5" rx="1" fill="url(#efCoil)" opacity="0.8"/>
  <rect x="8" y="65" width="14" height="5" rx="1" fill="url(#efCoil)" opacity="0.6"/>
  <rect x="8" y="73" width="14" height="5" rx="1" fill="url(#efCoil)" opacity="0.5"/>
  <!-- Left panel glow overlay -->
  <rect x="6" y="30" width="18" height="50" rx="2" fill="url(#efEnergyGlow)"/>

  <!-- === RIGHT ENERGY PANEL === -->
  <rect x="72" y="30" width="18" height="50" rx="2" fill="url(#efPanel)" stroke="#282c38" stroke-width="1"/>
  <!-- Energy coil bars (right panel, offset) -->
  <rect x="74" y="37" width="14" height="5" rx="1" fill="url(#efCoil)" opacity="0.7"/>
  <rect x="74" y="45" width="14" height="5" rx="1" fill="url(#efCoil)" opacity="0.9"/>
  <rect x="74" y="53" width="14" height="5" rx="1" fill="url(#efCoil)" opacity="0.8"/>
  <rect x="74" y="61" width="14" height="5" rx="1" fill="url(#efCoil)" opacity="0.6"/>
  <rect x="74" y="69" width="14" height="5" rx="1" fill="url(#efCoil)" opacity="0.7"/>
  <!-- Right panel glow overlay -->
  <rect x="72" y="30" width="18" height="50" rx="2" fill="url(#efEnergyGlow)"/>

  <!-- === CENTER FRONT FACE === -->
  <!-- Center display panel background -->
  <rect x="26" y="30" width="44" height="50" rx="2" fill="#3a4050" stroke="#282c38" stroke-width="0.8"/>

  <!-- Heating chamber recess -->
  <rect x="30" y="36" width="36" height="30" rx="3" fill="#181c24" stroke="#282c38" stroke-width="1"/>
  <!-- Heating element lines (electric resistance coils) -->
  <path d="M33,40 L60,40" stroke="#a060e0" stroke-width="1.5" opacity="0.7"/>
  <path d="M60,40 L60,44 L33,44 L33,48 L60,48 L60,52 L33,52 L33,56 L60,56 L60,60" stroke="#8040d0" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Hotspot glow in chamber -->
  <ellipse cx="48" cy="51" rx="16" ry="12" fill="#a060ff" opacity="0.08"/>

  <!-- Temperature gauge / display (bottom of center panel) -->
  <rect x="30" y="70" width="36" height="8" rx="2" fill="#141820" stroke="#282c38" stroke-width="0.8"/>
  <rect x="32" y="72" width="20" height="4" rx="1" fill="#7030d0" opacity="0.8"/>
  <circle cx="62" cy="74" r="2.5" fill="#141820" stroke="#4020a0" stroke-width="0.8"/>
  <circle cx="62" cy="74" r="1.2" fill="#9040ff" opacity="0.9"/>

  <!-- Corner bolts (all 4) -->
  <circle cx="8" cy="18" r="2" fill="#282c38" stroke="#7a8490" stroke-width="0.6"/>
  <circle cx="88" cy="18" r="2" fill="#282c38" stroke="#7a8490" stroke-width="0.6"/>
  <circle cx="8" cy="84" r="2" fill="#282c38" stroke="#7a8490" stroke-width="0.6"/>
  <circle cx="88" cy="84" r="2" fill="#282c38" stroke="#7a8490" stroke-width="0.6"/>

  <!-- Base band -->
  <rect x="4" y="82" width="88" height="8" rx="3" fill="#383c48" stroke="#282c38" stroke-width="1.5"/>
</svg>
