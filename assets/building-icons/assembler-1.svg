<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="a1Frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7a5230"/>
      <stop offset="100%" stop-color="#4e3018"/>
    </linearGradient>
    <linearGradient id="a1Face" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a6038"/>
      <stop offset="100%" stop-color="#b07848"/>
    </linearGradient>
    <linearGradient id="a1SlotDepth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#080400"/>
      <stop offset="100%" stop-color="#1a0e04"/>
    </linearGradient>
    <linearGradient id="a1GearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9a8868"/>
      <stop offset="100%" stop-color="#6a5838"/>
    </linearGradient>
  </defs>

  <!-- Outer frame -->
  <rect x="4" y="18" width="88" height="70" rx="4" fill="url(#a1Frame)" stroke="#2a1808" stroke-width="1.5"/>
  <!-- Face panel -->
  <rect x="10" y="24" width="76" height="58" rx="3" fill="url(#a1Face)" stroke="#3a2010" stroke-width="1"/>
  <!-- Top lip / header bar -->
  <rect x="4" y="18" width="88" height="12" rx="4" fill="#6a4828" stroke="#2a1808" stroke-width="1.5"/>

  <!-- 3 horizontal intake slots -->
  <rect x="14" y="38" width="56" height="8" rx="2" fill="url(#a1SlotDepth)" stroke="#2a1808" stroke-width="1"/>
  <rect x="14.5" y="38.5" width="55" height="1.5" rx="1" fill="#c09060" opacity="0.25"/>
  <rect x="14" y="51" width="56" height="8" rx="2" fill="url(#a1SlotDepth)" stroke="#2a1808" stroke-width="1"/>
  <rect x="14.5" y="51.5" width="55" height="1.5" rx="1" fill="#c09060" opacity="0.25"/>
  <rect x="14" y="64" width="56" height="8" rx="2" fill="url(#a1SlotDepth)" stroke="#2a1808" stroke-width="1"/>
  <rect x="14.5" y="64.5" width="55" height="1.5" rx="1" fill="#c09060" opacity="0.25"/>

  <!-- Side vent lines (right) -->
  <line x1="72" y1="30" x2="72" y2="80" stroke="#3a2010" stroke-width="0.8" opacity="0.5"/>
  <line x1="76" y1="30" x2="76" y2="80" stroke="#3a2010" stroke-width="0.8" opacity="0.5"/>
  <line x1="80" y1="30" x2="80" y2="80" stroke="#3a2010" stroke-width="0.8" opacity="0.5"/>

  <!-- Gear (top-right of face panel, cx=76, cy=29) -->
  <!-- R=9, r=6.75, 8 teeth, hub r=3.4, fill-rule evenodd -->
  <path fill-rule="evenodd"
        transform="translate(76,29)"
        d="M9,0 L6.24,2.58 6.36,6.36 2.58,6.24 0,9 -2.58,6.24 -6.36,6.36 -6.24,2.58 -9,0 -6.24,-2.58 -6.36,-6.36 -2.58,-6.24 0,-9 2.58,-6.24 6.36,-6.36 6.24,-2.58 Z M3.4,0 A3.4,3.4 0 1,0 -3.4,0 A3.4,3.4 0 1,0 3.4,0 Z"
        fill="url(#a1GearGrad)" stroke="#2a1808" stroke-width="0.8" stroke-linejoin="round"/>

  <!-- Corner bolts -->
  <circle cx="12" cy="26" r="2" fill="#2a1808" stroke="#7a5030" stroke-width="0.6"/>
  <circle cx="84" cy="26" r="2" fill="#2a1808" stroke="#7a5030" stroke-width="0.6"/>
  <circle cx="12" cy="80" r="2" fill="#2a1808" stroke="#7a5030" stroke-width="0.6"/>
  <circle cx="84" cy="80" r="2" fill="#2a1808" stroke="#7a5030" stroke-width="0.6"/>

  <!-- Base band -->
  <rect x="4" y="78" width="88" height="10" rx="3" fill="#4e3018" stroke="#2a1808" stroke-width="1.5"/>
</svg>
