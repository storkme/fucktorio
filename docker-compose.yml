services:
  claude-agent:
    build: .
    volumes:
      - .:/workspace                          # project code
      - ~/.claude:/home/node/.claude:ro         # claude.ai auth token
      - ~/.config/gh:/home/node/.config/gh:ro  # GitHub CLI token
    working_dir: /workspace
    stdin_open: true
    tty: true
    command: claude --dangerously-skip-permissions
